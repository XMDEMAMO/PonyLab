<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PonyLab 首页桌面主视觉预览</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #08131d;
        color: #edf6f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1024px;
        overflow: hidden;
      }

      button {
        font: inherit;
      }

      .hero {
        position: relative;
        isolation: isolate;
        min-height: 100vh;
        overflow: hidden;
        background: #08131d;
      }

      .hero__scene,
      .hero__mask {
        position: absolute;
        inset: 0;
      }

      .hero__scene {
        z-index: -3;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 50%;
      }

      .hero__mask {
        z-index: -2;
        background:
          linear-gradient(90deg, rgba(5, 15, 23, 0.82) 0%, rgba(7, 20, 30, 0.4) 31%, rgba(7, 20, 30, 0.04) 60%, rgba(7, 20, 30, 0.2) 100%),
          linear-gradient(180deg, rgba(3, 10, 16, 0.44) 0%, transparent 26%, transparent 70%, rgba(3, 10, 16, 0.64) 100%);
        pointer-events: none;
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: min(88vw, 1500px);
        height: 88px;
        margin: 0 auto;
        border-bottom: 1px solid rgba(218, 236, 241, 0.18);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 750;
        letter-spacing: 0.08em;
      }

      .brand__mark {
        display: grid;
        width: 34px;
        aspect-ratio: 1;
        place-items: center;
        border: 1px solid rgba(219, 238, 243, 0.5);
        border-radius: 12px;
        background: rgba(132, 166, 178, 0.16);
        box-shadow: inset 0 0 24px rgba(181, 224, 233, 0.1);
      }

      nav {
        display: flex;
        gap: 30px;
        color: rgba(237, 246, 248, 0.74);
        font-size: 14px;
      }

      .hero__content {
        position: relative;
        width: min(88vw, 1500px);
        height: calc(100vh - 88px);
        margin: 0 auto;
      }

      .intro {
        position: absolute;
        top: clamp(118px, 17vh, 190px);
        left: 0;
        width: min(520px, 35vw);
        transition: 460ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #dcca67;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(66px, 7vw, 116px);
        font-weight: 820;
        letter-spacing: -0.065em;
        line-height: 0.86;
        text-shadow: 0 8px 30px rgba(1, 8, 13, 0.52);
      }

      .subtitle {
        max-width: 430px;
        margin: 24px 0 0;
        color: rgba(237, 246, 248, 0.8);
        font-size: clamp(16px, 1.25vw, 20px);
        line-height: 1.7;
        text-shadow: 0 3px 18px rgba(1, 8, 13, 0.7);
      }

      .terminal {
        width: min(450px, 34vw);
        margin-top: 28px;
        padding: 17px 20px;
        border: 1px solid rgba(190, 218, 225, 0.24);
        border-radius: 18px;
        background: rgba(8, 22, 32, 0.62);
        box-shadow: 0 24px 70px rgba(1, 8, 13, 0.24);
        backdrop-filter: blur(12px);
        color: #c9dce2;
        font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
        font-size: 13px;
        line-height: 1.7;
      }

      .terminal strong {
        color: #e7d979;
        font-weight: 600;
      }

      .profile-card {
        position: absolute;
        top: clamp(160px, 23vh, 245px);
        right: 0;
        width: min(390px, 29vw);
        padding: 26px;
        border: 1px solid rgba(207, 231, 237, 0.3);
        border-radius: 28px;
        background: linear-gradient(145deg, rgba(20, 41, 52, 0.82), rgba(14, 29, 40, 0.68));
        box-shadow: 0 30px 90px rgba(0, 7, 12, 0.38);
        backdrop-filter: blur(18px);
        opacity: 0;
        transform: translate3d(0, 58px, 0) scale(0.96);
        transition: 520ms cubic-bezier(0.22, 1, 0.36, 1);
        pointer-events: none;
      }

      .profile-card__head {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .avatar {
        display: grid;
        flex: 0 0 auto;
        width: 64px;
        aspect-ratio: 1;
        place-items: center;
        border: 1px solid rgba(226, 242, 246, 0.36);
        border-radius: 20px;
        background: linear-gradient(145deg, #7596a5, #394f5d);
        color: #f2e586;
        font-size: 22px;
        font-weight: 800;
      }

      .profile-card h2 {
        margin: 0 0 5px;
        font-size: 22px;
      }

      .profile-card small {
        color: #a9c0c8;
      }

      .profile-card p {
        margin: 22px 0;
        color: #c9d9de;
        line-height: 1.7;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chips span {
        padding: 7px 11px;
        border: 1px solid rgba(190, 218, 225, 0.2);
        border-radius: 999px;
        background: rgba(164, 190, 201, 0.1);
        color: #d3e2e6;
        font-size: 12px;
      }

      .stage-controls {
        position: absolute;
        right: 0;
        bottom: 34px;
        left: 0;
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .stage-controls button {
        padding: 10px 16px;
        border: 1px solid rgba(221, 238, 242, 0.3);
        border-radius: 999px;
        background: rgba(7, 19, 28, 0.66);
        color: #dcecef;
        cursor: pointer;
        backdrop-filter: blur(12px);
      }

      .stage-controls button[aria-pressed="true"] {
        border-color: rgba(236, 221, 125, 0.78);
        background: rgba(93, 105, 88, 0.72);
        color: #fff6ba;
      }

      .hero[data-stage="2"] .intro {
        opacity: 0;
        transform: translate3d(0, -28px, 0);
        pointer-events: none;
      }

      .hero[data-stage="2"] .profile-card {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }

      .preview-note {
        position: absolute;
        right: 24px;
        top: 104px;
        margin: 0;
        color: rgba(230, 241, 244, 0.55);
        font-size: 12px;
        writing-mode: vertical-rl;
        letter-spacing: 0.12em;
      }

      @media (prefers-reduced-motion: reduce) {
        .intro,
        .profile-card {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" data-stage="1">
      <img
        class="hero__scene"
        src="../../../壁纸/74017219_p0.jpg"
        alt="人物、光环、翅膀、向日葵与城市背景组成的完整插画"
      />
      <div class="hero__mask" aria-hidden="true"></div>

      <header class="site-header">
        <div class="brand"><span class="brand__mark">P</span>PonyLab</div>
        <nav aria-label="主导航">
          <span>首页</span><span>博客</span><span>项目</span><span>关于</span>
        </nav>
      </header>

      <div class="hero__content">
        <section class="intro" aria-label="阶段一：标题展示">
          <p class="eyebrow">Personal laboratory · 2026</p>
          <h1>Pony<br />Lab.</h1>
          <p class="subtitle">记录技术、创作与生活切片，在冷色城市上留下一点温暖的光。</p>
          <div class="terminal">
            <div><strong>pony@lab</strong>:~$ whoami</div>
            <div>Developer · Learner · Dreamer<span aria-hidden="true">_</span></div>
          </div>
        </section>

        <aside class="profile-card" aria-label="阶段二：个人名片">
          <div class="profile-card__head">
            <div class="avatar" aria-hidden="true">P</div>
            <div><h2>作者名称待填写</h2><small>目前正在持续学习与创作</small></div>
          </div>
          <p>这里使用普通头像和类型化占位简介。名片只在前景移动，后方完整插画不会缩放、变暗、模糊或换位。</p>
          <div class="chips"><span>Astro</span><span>TypeScript</span><span>Design</span></div>
        </aside>

        <p class="preview-note">DESKTOP COVER PREVIEW · 1440 × 900 RECOMMENDED</p>

        <div class="stage-controls" aria-label="预览阶段切换">
          <button type="button" data-stage-button="1" aria-pressed="true">阶段一 · 标题</button>
          <button type="button" data-stage-button="2" aria-pressed="false">阶段二 · 名片</button>
        </div>
      </div>
    </main>

    <script>
      const hero = document.querySelector('.hero');
      const buttons = document.querySelectorAll('[data-stage-button]');

      for (const button of buttons) {
        button.addEventListener('click', () => {
          const stage = button.dataset.stageButton;
          hero.dataset.stage = stage;
          for (const item of buttons) {
            item.setAttribute('aria-pressed', String(item === button));
          }
        });
      }
    </script>
  </body>
</html>
